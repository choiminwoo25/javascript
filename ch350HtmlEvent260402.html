<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>버튼 클릭 이벤트</title>
  <script>
    function showMessage() {
      alert("버튼이 클릭되었습니다!");
    }
  </script>
</head>
<body>

  <h2>HTML 이벤트 속성 예제</h2>

  <!-- 버튼 클릭 시 함수 실행 -->
  <button onclick="showMessage()">클릭하세요</button>

</body>
</html>
